<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrustFix | Phase 3 Intelligence Layer</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    body { font-family: Inter, system-ui, -apple-system, sans-serif; }
    .hero-gradient {
      background: radial-gradient(circle at 10% 20%, rgba(59,130,246,0.35), transparent 35%),
                  radial-gradient(circle at 90% 10%, rgba(45,212,191,0.3), transparent 30%),
                  linear-gradient(145deg, #0f172a 0%, #111827 50%, #1e293b 100%);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const STORAGE_KEY = 'trustfix.reliabilityEvents.v1';

    const contractors = [
      { id: 1, name: 'Maya Plumbing Co.', trade: 'plumbing', etaMin: 32, local: 'Northside', activeJobs: 1, mitigation: false },
      { id: 2, name: 'Riverside Electric', trade: 'electrical', etaMin: 41, local: 'Downtown', activeJobs: 2, mitigation: false },
      { id: 3, name: 'Evergreen Home Repair', trade: 'general', etaMin: 27, local: 'East End', activeJobs: 3, mitigation: true },
      { id: 4, name: 'Springfield Rooter', trade: 'plumbing', etaMin: 84, local: 'Westfield', activeJobs: 1, mitigation: true },
      { id: 5, name: 'Solid Spark Systems', trade: 'electrical', etaMin: 35, local: 'South Park', activeJobs: 0, mitigation: false },
      { id: 6, name: 'Rapid Dry Mitigation', trade: 'mitigation', etaMin: 55, local: 'Metro Core', activeJobs: 1, mitigation: true },
    ];

    function seedEvents() {
      const now = Date.now();
      const day = 24 * 60 * 60 * 1000;
      return [
        { contractorId: 1, jobId: 'j-100', type: 'completed_on_time', timestamp: now - day * 2, rating: 5 },
        { contractorId: 1, jobId: 'j-101', type: 'completed_on_time', timestamp: now - day * 1, rating: 5 },
        { contractorId: 2, jobId: 'j-200', type: 'late', timestamp: now - day * 5, rating: 3 },
        { contractorId: 2, jobId: 'j-201', type: 'completed_on_time', timestamp: now - day * 1, rating: 4 },
        { contractorId: 3, jobId: 'j-300', type: 'cancelled', timestamp: now - day * 3, rating: 2 },
        { contractorId: 4, jobId: 'j-400', type: 'completed_on_time', timestamp: now - day * 7, rating: 5 },
        { contractorId: 5, jobId: 'j-500', type: 'dispute', timestamp: now - day * 10, rating: 1 },
        { contractorId: 6, jobId: 'j-600', type: 'completed_on_time', timestamp: now - day * 1, rating: 5 },
      ];
    }

    function loadEvents() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          const seeded = seedEvents();
          localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded));
          return seeded;
        }
        return JSON.parse(raw);
      } catch {
        return seedEvents();
      }
    }

    function saveEvents(events) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
    }

    function calcScore(events) {
      if (!events.length) return 60;
      const now = Date.now();
      const sorted = [...events].sort((a, b) => a.timestamp - b.timestamp);
      const latest = sorted[sorted.length - 1];
      const ageDays = (now - latest.timestamp) / (1000 * 60 * 60 * 24);

      const baseScore = 50;
      const recencyWeight = Math.max(0.7, 1.25 - Math.min(ageDays / 60, 0.55));
      const completedOnTime = sorted.filter((e) => e.type === 'completed_on_time').length;
      const late = sorted.filter((e) => e.type === 'late').length;
      const disputes = sorted.filter((e) => e.type === 'dispute').length;
      const cancelled = sorted.filter((e) => e.type === 'cancelled').length;
      const totalClosed = completedOnTime + late + disputes + cancelled;
      const onTimeRate = totalClosed ? completedOnTime / totalClosed : 0;
      const completionVolume = Math.min(totalClosed / 15, 1);
      const disputePenalty = disputes + cancelled * 0.6;

      const score = baseScore * recencyWeight + onTimeRate * 40 + completionVolume * 10 - disputePenalty * 15;
      return Math.max(0, Math.min(100, Math.round(score)));
    }

    function fallbackParse(description) {
      const t = description.toLowerCase();
      const plumbing = /(pipe|leak|valve|drain|water)/.test(t);
      const electrical = /(power|breaker|outlet|light|spark)/.test(t);
      const critical = /(flood|smoke|fire|burst)/.test(t);
      const emergency = /(now|immediately|urgent|asap)/.test(t) || critical;
      const flags = [];
      if (/(water|leak|flood|wet)/.test(t)) flags.push('potential_water_damage');

      return {
        trade: plumbing ? 'plumbing' : electrical ? 'electrical' : 'general',
        severity: critical ? 'critical' : 'moderate',
        urgency: emergency ? 'emergency' : 'same-day',
        summary: description.slice(0, 120),
        suggestedActions: plumbing
          ? ['Inspect shutoff valve', 'Check water pressure', 'Assess pipe condition']
          : electrical
          ? ['Inspect panel', 'Check breaker loads', 'Test outlet continuity']
          : ['Inspect issue site', 'Document damage', 'Create repair scope'],
        flags,
      };
    }

    async function llmParseIntake(description) {
      const apiKey = window.TRUSTFIX_OPENAI_API_KEY;
      if (!apiKey) throw new Error('LLM unavailable: missing API key');

      const prompt = `Extract structured home-service intake JSON only. Description: ${description}`;
      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${apiKey}`,
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          temperature: 0,
          response_format: { type: 'json_object' },
          messages: [
            {
              role: 'system',
              content: 'Return JSON with keys: trade, severity, urgency, summary, suggestedActions, flags.',
            },
            { role: 'user', content: prompt },
          ],
        }),
      });

      if (!response.ok) throw new Error(`LLM request failed: ${response.status}`);
      const data = await response.json();
      const parsed = JSON.parse(data.choices?.[0]?.message?.content || '{}');
      if (!parsed.trade || !parsed.urgency) throw new Error('LLM JSON missing required fields');
      return parsed;
    }

    const ROUTING_RULES = [
      {
        id: 'critical_score_eta',
        when: (i) => i.severity === 'critical',
        apply: (list) => list.filter((c) => c.score >= 95 && c.etaMin <= 120),
        description: 'severity=critical → score ≥ 95 and ETA ≤ 2hrs',
      },
      {
        id: 'exclude_overloaded',
        when: () => true,
        apply: (list) => list.filter((c) => c.activeJobs <= 2),
        description: 'exclude contractors with active jobs > 2',
      },
      {
        id: 'water_damage_mitigation',
        when: (i) => (i.flags || []).includes('potential_water_damage'),
        apply: (list, all) => {
          const specialists = all.filter((c) => c.mitigation);
          const ids = new Set(list.map((c) => c.id));
          specialists.forEach((s) => ids.add(s.id));
          return all.filter((c) => ids.has(c.id));
        },
        description: 'flag potential_water_damage → add mitigation specialist pool',
      },
    ];

    function App() {
      const [events, setEvents] = React.useState(loadEvents);
      const [description, setDescription] = React.useState('My shutoff valve has been weeping for 48 hours and wall is damp.');
      const [zip, setZip] = React.useState('01103');
      const [parsed, setParsed] = React.useState(null);
      const [agentLog, setAgentLog] = React.useState([]);
      const [loading, setLoading] = React.useState(false);

      const contractorStats = React.useMemo(() => {
        return contractors.map((c) => {
          const mine = events.filter((e) => e.contractorId === c.id);
          return { ...c, score: calcScore(mine) };
        });
      }, [events]);

      const [matches, setMatches] = React.useState([]);

      async function runIntake() {
        setLoading(true);
        try {
          let intake;
          try {
            intake = await llmParseIntake(description);
            setAgentLog((l) => [`LLM parse succeeded for ZIP ${zip}.`, ...l].slice(0, 10));
          } catch (err) {
            intake = fallbackParse(description);
            setAgentLog((l) => [`⚠️ LLM unavailable, using fallback parser: ${err.message}`, ...l].slice(0, 10));
          }

          setParsed(intake);

          const tradePool = contractorStats.filter((c) => c.trade === intake.trade || c.trade === 'mitigation');
          let routed = tradePool;
          const applied = [];

          ROUTING_RULES.forEach((rule) => {
            if (rule.when(intake)) {
              routed = rule.apply(routed, contractorStats);
              applied.push(rule.description);
            }
          });

          routed = [...routed].sort((a, b) => (b.score - a.score) || (a.etaMin - b.etaMin));
          setMatches(routed.slice(0, intake.urgency === 'emergency' ? 3 : 4));

          const reasoning = `Parsed: ${intake.trade}, ${intake.severity} severity. Applying ${intake.urgency} routing rules. ${applied.join('; ')}. Ranked ${routed.length} candidates.`;
          const emergencyNote = intake.urgency === 'emergency'
            ? 'Emergency flow: bypassing waitlist and alerting top 3 simultaneously.'
            : 'Standard flow: top candidates queued for homeowner review.';

          setAgentLog((l) => [reasoning, emergencyNote, ...l].slice(0, 10));
        } finally {
          setLoading(false);
        }
      }

      function addEvent(contractorId, type, rating = 5) {
        const now = Date.now();
        const next = [...events, { contractorId, jobId: `job-${contractorId}-${now}`, type, timestamp: now, rating }];
        saveEvents(next);
        setEvents(next);
      }

      React.useEffect(() => { runIntake(); }, []);

      return (
        <div>
          <header className="hero-gradient text-white">
            <div className="mx-auto max-w-6xl px-6 py-14">
              <p className="inline-flex rounded-full bg-cyan-400/20 px-3 py-1 text-xs font-bold uppercase tracking-wider text-cyan-200 ring-1 ring-cyan-300/40">Phase 3: Intelligence Layer</p>
              <h1 className="mt-4 max-w-4xl text-4xl font-extrabold leading-tight md:text-5xl">LLM intake parsing + smart routing rules.</h1>
              <p className="mt-4 max-w-3xl text-slate-200">TrustFix now reasons over natural language, applies declarative routing rules, and logs exactly why each contractor was ranked.</p>
            </div>
          </header>

          <main className="mx-auto max-w-6xl space-y-8 px-6 py-10">
            <section className="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
              <h2 className="text-xl font-extrabold">Intake agent</h2>
              <div className="mt-4 grid gap-4 md:grid-cols-2">
                <label className="text-sm font-semibold text-slate-700">Describe your issue
                  <textarea value={description} onChange={(e) => setDescription(e.target.value)} rows="4" className="mt-2 w-full rounded-lg border border-slate-300 px-3 py-2" />
                </label>
                <div>
                  <label className="text-sm font-semibold text-slate-700">ZIP code
                    <input value={zip} onChange={(e) => setZip(e.target.value)} className="mt-2 w-full rounded-lg border border-slate-300 px-3 py-2" />
                  </label>
                  <button onClick={runIntake} disabled={loading} className="mt-4 rounded-lg bg-indigo-600 px-4 py-2 text-sm font-bold text-white hover:bg-indigo-500 disabled:opacity-60">
                    {loading ? 'Parsing...' : 'Run intake + routing'}
                  </button>
                </div>
              </div>

              {parsed && (
                <pre className="mt-4 overflow-auto rounded-xl bg-slate-900 p-4 text-xs text-slate-100">{JSON.stringify(parsed, null, 2)}</pre>
              )}
            </section>

            <section className="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
              <h2 className="text-xl font-extrabold">Smart routed contractors (live score aware)</h2>
              <div className="mt-4 grid gap-4 lg:grid-cols-3">
                {matches.map((c, idx) => (
                  <article key={c.id} className="rounded-xl border border-slate-200 p-4">
                    <div className="flex items-center justify-between">
                      <p className="font-bold">#{idx + 1} {c.name}</p>
                      <span className="rounded-md bg-indigo-50 px-2 py-1 text-xs font-bold text-indigo-700">Score {c.score}</span>
                    </div>
                    <p className="mt-1 text-sm text-slate-600">{c.trade} • ETA {c.etaMin}m • Active jobs {c.activeJobs}</p>
                    <div className="mt-3 flex flex-wrap gap-2">
                      <button onClick={() => addEvent(c.id, 'completed_on_time', 5)} className="rounded bg-emerald-600 px-2 py-1 text-xs font-bold text-white">+ On-time</button>
                      <button onClick={() => addEvent(c.id, 'dispute', 1)} className="rounded bg-red-600 px-2 py-1 text-xs font-bold text-white">+ Dispute</button>
                    </div>
                  </article>
                ))}
              </div>
            </section>

            <section className="rounded-2xl bg-slate-900 p-6 text-white">
              <h2 className="text-xl font-extrabold">Agent reasoning log</h2>
              <ul className="mt-3 space-y-2">
                {agentLog.map((line, i) => <li key={i} className="rounded-lg bg-slate-800 px-3 py-2 text-sm">{line}</li>)}
              </ul>
            </section>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
