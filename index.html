<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrustFix | Phase 2 Trust Score Engine</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    body { font-family: Inter, system-ui, -apple-system, sans-serif; }
    .hero-gradient {
      background: radial-gradient(circle at 10% 20%, rgba(59,130,246,0.35), transparent 35%),
                  radial-gradient(circle at 90% 10%, rgba(45,212,191,0.3), transparent 30%),
                  linear-gradient(145deg, #0f172a 0%, #111827 50%, #1e293b 100%);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const STORAGE_KEY = 'trustfix.reliabilityEvents.v1';

    const contractors = [
      { id: 1, name: 'Maya Plumbing Co.', trade: 'Plumber', eta: 32, local: 'Northside' },
      { id: 2, name: 'Riverside Electric', trade: 'Electrician', eta: 41, local: 'Downtown' },
      { id: 3, name: 'Evergreen Home Repair', trade: 'Handyman', eta: 27, local: 'East End' },
      { id: 4, name: 'Springfield Rooter', trade: 'Plumber', eta: 24, local: 'Westfield' },
      { id: 5, name: 'Solid Spark Systems', trade: 'Electrician', eta: 35, local: 'South Park' },
    ];

    function seedEvents() {
      const now = Date.now();
      const day = 24 * 60 * 60 * 1000;
      return [
        { contractorId: 1, jobId: 'j-100', type: 'completed_on_time', timestamp: now - day * 2, rating: 5 },
        { contractorId: 1, jobId: 'j-101', type: 'completed_on_time', timestamp: now - day * 1, rating: 5 },
        { contractorId: 2, jobId: 'j-200', type: 'late', timestamp: now - day * 5, rating: 3 },
        { contractorId: 2, jobId: 'j-201', type: 'completed_on_time', timestamp: now - day * 1, rating: 4 },
        { contractorId: 3, jobId: 'j-300', type: 'cancelled', timestamp: now - day * 3, rating: 2 },
        { contractorId: 4, jobId: 'j-400', type: 'completed_on_time', timestamp: now - day * 7, rating: 5 },
        { contractorId: 5, jobId: 'j-500', type: 'dispute', timestamp: now - day * 10, rating: 1 },
      ];
    }

    function loadEvents() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          const seeded = seedEvents();
          localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded));
          return seeded;
        }
        return JSON.parse(raw);
      } catch {
        return seedEvents();
      }
    }

    function saveEvents(events) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
    }

    function parseIssue(text) {
      const value = text.toLowerCase();
      if (value.includes('pipe') || value.includes('leak') || value.includes('drain')) return 'Plumber';
      if (value.includes('power') || value.includes('outlet') || value.includes('breaker') || value.includes('light')) return 'Electrician';
      return 'Handyman';
    }

    function calcScore(events) {
      if (!events.length) return 60;

      const now = Date.now();
      const sorted = [...events].sort((a, b) => a.timestamp - b.timestamp);
      const latest = sorted[sorted.length - 1];
      const ageDays = (now - latest.timestamp) / (1000 * 60 * 60 * 24);

      const baseScore = 50;
      const recencyWeight = Math.max(0.7, 1.25 - Math.min(ageDays / 60, 0.55));
      const completedOnTime = sorted.filter((e) => e.type === 'completed_on_time').length;
      const late = sorted.filter((e) => e.type === 'late').length;
      const disputes = sorted.filter((e) => e.type === 'dispute').length;
      const cancelled = sorted.filter((e) => e.type === 'cancelled').length;

      const totalClosed = completedOnTime + late + disputes + cancelled;
      const onTimeRate = totalClosed ? completedOnTime / totalClosed : 0;
      const completionVolume = Math.min(totalClosed / 15, 1);
      const disputePenalty = disputes + cancelled * 0.6;

      const score =
        baseScore * recencyWeight +
        onTimeRate * 40 +
        completionVolume * 10 -
        disputePenalty * 15;

      return Math.max(0, Math.min(100, Math.round(score)));
    }

    function consecutiveOnTime(events) {
      const sorted = [...events].sort((a, b) => b.timestamp - a.timestamp);
      let streak = 0;
      for (const event of sorted) {
        if (event.type === 'completed_on_time') streak += 1;
        else break;
      }
      return streak;
    }

    function disputeFreeDays(events) {
      const sorted = [...events]
        .filter((e) => e.type === 'dispute')
        .sort((a, b) => b.timestamp - a.timestamp);
      if (!sorted.length) return 999;
      return Math.floor((Date.now() - sorted[0].timestamp) / (1000 * 60 * 60 * 24));
    }

    function historyScores(contractorId, allEvents) {
      const filtered = allEvents
        .filter((e) => e.contractorId === contractorId)
        .sort((a, b) => a.timestamp - b.timestamp);
      const snapshots = [];
      for (let i = 0; i < filtered.length; i += 1) {
        const partial = filtered.slice(0, i + 1);
        snapshots.push(calcScore(partial));
      }
      return snapshots.slice(-10);
    }

    function Sparkline({ points }) {
      const w = 180;
      const h = 44;
      if (!points.length) return <div className="h-11 rounded bg-slate-100" />;
      const min = Math.min(...points);
      const max = Math.max(...points);
      const spread = Math.max(1, max - min);
      const coords = points.map((p, i) => {
        const x = (i / Math.max(1, points.length - 1)) * (w - 8) + 4;
        const y = h - ((p - min) / spread) * (h - 10) - 5;
        return `${x},${y}`;
      }).join(' ');

      return (
        <svg width="100%" viewBox={`0 0 ${w} ${h}`} className="h-11 w-full rounded bg-slate-100 p-1">
          <polyline fill="none" stroke="#4f46e5" strokeWidth="2.5" points={coords} />
        </svg>
      );
    }

    function App() {
      const [events, setEvents] = React.useState(loadEvents);
      const [issue, setIssue] = React.useState('Burst pipe in basement, water rising quickly.');
      const [zip, setZip] = React.useState('01103');
      const [agentLog, setAgentLog] = React.useState([]);

      const selectedTrade = parseIssue(issue);

      const contractorStats = React.useMemo(() => {
        return contractors.map((c) => {
          const mine = events.filter((e) => e.contractorId === c.id);
          const score = calcScore(mine);
          const history = historyScores(c.id, events);
          return { ...c, score, history, events: mine };
        });
      }, [events]);

      const matches = contractorStats
        .filter((c) => c.trade === selectedTrade)
        .sort((a, b) => (b.score - a.score) || (a.eta - b.eta))
        .slice(0, 3);

      function addEvent(contractorId, type, rating = 5) {
        const now = Date.now();
        const jobId = `job-${contractorId}-${now}`;

        const beforeEvents = events.filter((e) => e.contractorId === contractorId);
        const beforeScore = calcScore(beforeEvents);

        const next = [...events, { contractorId, jobId, type, timestamp: now, rating }];
        saveEvents(next);
        setEvents(next);

        const afterEvents = [...beforeEvents, { contractorId, jobId, type, timestamp: now, rating }];
        const afterScore = calcScore(afterEvents);
        const streak = consecutiveOnTime(afterEvents);
        const noDisputeDays = disputeFreeDays(afterEvents);
        const contractor = contractors.find((c) => c.id === contractorId);

        const msg = `${contractor.name} score updated ${beforeScore} → ${afterScore} after ${streak} consecutive on-time completions. Dispute-free for ${noDisputeDays} days.`;
        setAgentLog((prev) => [msg, ...prev].slice(0, 8));
      }

      function resetData() {
        const seeded = seedEvents();
        saveEvents(seeded);
        setEvents(seeded);
        setAgentLog(['Reliability event store reset to seed data.']);
      }

      return (
        <div>
          <header className="hero-gradient text-white">
            <div className="mx-auto max-w-6xl px-6 py-14">
              <p className="inline-flex rounded-full bg-cyan-400/20 px-3 py-1 text-xs font-bold uppercase tracking-wider text-cyan-200 ring-1 ring-cyan-300/40">Phase 2: Trust Score Engine</p>
              <h1 className="mt-4 max-w-4xl text-4xl font-extrabold leading-tight md:text-5xl">Live reliability scores powered by real job outcomes.</h1>
              <p className="mt-4 max-w-3xl text-slate-200">No more fake static scores. Recommendations now change in real time based on completed-on-time, late, dispute, and cancelled events.</p>
            </div>
          </header>

          <main className="mx-auto max-w-6xl space-y-8 px-6 py-10">
            <section className="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
              <h2 className="text-xl font-extrabold">AI routing input</h2>
              <div className="mt-4 grid gap-4 md:grid-cols-2">
                <label className="text-sm font-semibold text-slate-700">Issue description
                  <textarea value={issue} onChange={(e) => setIssue(e.target.value)} rows="3" className="mt-2 w-full rounded-lg border border-slate-300 px-3 py-2" />
                </label>
                <label className="text-sm font-semibold text-slate-700">ZIP code
                  <input value={zip} onChange={(e) => setZip(e.target.value)} className="mt-2 w-full rounded-lg border border-slate-300 px-3 py-2" />
                  <p className="mt-2 text-xs text-slate-500">Detected trade: <strong>{selectedTrade}</strong> • ZIP context {zip}</p>
                </label>
              </div>
            </section>

            <section className="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
              <div className="flex items-center justify-between">
                <h2 className="text-xl font-extrabold">Live ranked contractors</h2>
                <button onClick={resetData} className="rounded-lg border border-slate-300 px-3 py-2 text-sm font-bold text-slate-700">Reset event store</button>
              </div>
              <div className="mt-5 grid gap-4 lg:grid-cols-3">
                {matches.map((c, idx) => (
                  <article key={c.id} className="rounded-xl border border-slate-200 p-4">
                    <div className="flex items-center justify-between">
                      <p className="font-bold">#{idx + 1} {c.name}</p>
                      <span className="rounded-md bg-indigo-50 px-2 py-1 text-xs font-bold text-indigo-700">Score {c.score}</span>
                    </div>
                    <p className="mt-1 text-sm text-slate-600">{c.trade} • {c.local} • ETA {c.eta}m</p>
                    <p className="mt-2 text-xs font-semibold text-slate-500">Last 10 score updates</p>
                    <Sparkline points={c.history} />
                    <div className="mt-3 flex flex-wrap gap-2">
                      <button onClick={() => addEvent(c.id, 'completed_on_time', 5)} className="rounded bg-emerald-600 px-2 py-1 text-xs font-bold text-white">+ On-time</button>
                      <button onClick={() => addEvent(c.id, 'late', 3)} className="rounded bg-amber-500 px-2 py-1 text-xs font-bold text-white">+ Late</button>
                      <button onClick={() => addEvent(c.id, 'dispute', 1)} className="rounded bg-red-600 px-2 py-1 text-xs font-bold text-white">+ Dispute</button>
                      <button onClick={() => addEvent(c.id, 'cancelled', 2)} className="rounded bg-slate-600 px-2 py-1 text-xs font-bold text-white">+ Cancelled</button>
                    </div>
                  </article>
                ))}
              </div>
            </section>

            <section className="rounded-2xl bg-slate-900 p-6 text-white">
              <h2 className="text-xl font-extrabold">Agent score change log</h2>
              <p className="mt-1 text-sm text-slate-300">Formula: baseScore × recencyWeight + onTimeRate × 40 + completionVolume × 10 − disputePenalty × 15</p>
              <ul className="mt-4 space-y-2">
                {agentLog.length === 0 && <li className="text-sm text-slate-400">No updates yet. Record events to see explanations.</li>}
                {agentLog.map((line, i) => <li key={i} className="rounded-lg bg-slate-800 px-3 py-2 text-sm">{line}</li>)}
              </ul>
            </section>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
