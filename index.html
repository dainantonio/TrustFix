<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrustFix | Next-Phase Agentic Local Marketplace</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    body { font-family: Inter, system-ui, -apple-system, sans-serif; }
    .hero-gradient {
      background: radial-gradient(circle at 10% 20%, rgba(59,130,246,0.35), transparent 35%),
                  radial-gradient(circle at 90% 10%, rgba(45,212,191,0.3), transparent 30%),
                  linear-gradient(145deg, #0f172a 0%, #111827 50%, #1e293b 100%);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const pros = [
      { id: 1, name: 'Maya Plumbing Co.', trade: 'Plumber', score: 98, eta: 32, jobs: 214, local: 'Northside', emergency: true },
      { id: 2, name: 'Riverside Electric', trade: 'Electrician', score: 96, eta: 41, jobs: 167, local: 'Downtown', emergency: true },
      { id: 3, name: 'Evergreen Home Repair', trade: 'Handyman', score: 95, eta: 27, jobs: 289, local: 'East End', emergency: false },
      { id: 4, name: 'Springfield Rooter', trade: 'Plumber', score: 94, eta: 24, jobs: 141, local: 'Westfield', emergency: true },
      { id: 5, name: 'Solid Spark Systems', trade: 'Electrician', score: 93, eta: 35, jobs: 122, local: 'South Park', emergency: false },
    ];

    const stageOrder = ['Intake', 'Matching', 'Booked', 'In Progress', 'Completed'];

    function parseIssue(text) {
      const value = text.toLowerCase();
      if (value.includes('pipe') || value.includes('leak') || value.includes('drain')) {
        return {
          trade: 'Plumber',
          urgency: 'High',
          summary: 'Likely plumbing emergency. Route licensed plumbers with top completion and emergency response records.'
        };
      }
      if (value.includes('power') || value.includes('outlet') || value.includes('breaker') || value.includes('light')) {
        return {
          trade: 'Electrician',
          urgency: 'High',
          summary: 'Electrical issue detected. Prioritize electricians with same-day diagnostics and high on-time arrival rate.'
        };
      }
      return {
        trade: 'Handyman',
        urgency: 'Medium',
        summary: 'General repair task. Match by reliability score, proximity, and recent homeowner ratings.'
      };
    }

    function sortMatches(candidates) {
      return [...candidates].sort((a, b) => (b.score - a.score) || (a.eta - b.eta));
    }

    function NextPhasePlanner() {
      const [issue, setIssue] = React.useState('Burst pipe in basement, water rising quickly.');
      const [zip, setZip] = React.useState('01103');
      const [stage, setStage] = React.useState(0);

      const analysis = parseIssue(issue);
      const matches = sortMatches(pros.filter((pro) => pro.trade === analysis.trade)).slice(0, 3);

      const advanceStage = () => setStage((s) => Math.min(s + 1, stageOrder.length - 1));
      const resetStage = () => setStage(0);

      return (
        <section className="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
          <div className="flex flex-wrap items-center justify-between gap-3">
            <div>
              <p className="text-xs font-bold uppercase tracking-wider text-indigo-600">Next Phase: Agentic Job Flow</p>
              <h2 className="mt-1 text-xl font-extrabold">AI intake → matching → execution tracker</h2>
            </div>
            <span className="rounded-full bg-indigo-50 px-3 py-1 text-xs font-bold text-indigo-700">Local-first + explainable</span>
          </div>

          <div className="mt-5 grid gap-4 md:grid-cols-2">
            <label className="text-sm font-semibold text-slate-700">Describe your issue
              <textarea
                value={issue}
                onChange={(e) => setIssue(e.target.value)}
                rows="4"
                className="mt-2 w-full rounded-lg border border-slate-300 px-3 py-2"
              />
            </label>

            <div className="space-y-3">
              <label className="text-sm font-semibold text-slate-700">ZIP code
                <input value={zip} onChange={(e) => setZip(e.target.value)} className="mt-2 w-full rounded-lg border border-slate-300 px-3 py-2" />
              </label>

              <div className="rounded-xl bg-slate-900 p-4 text-slate-100">
                <p className="text-sm"><strong>Detected trade:</strong> {analysis.trade}</p>
                <p className="mt-1 text-sm"><strong>Urgency:</strong> {analysis.urgency}</p>
                <p className="mt-2 text-xs text-slate-300">{analysis.summary}</p>
                <p className="mt-2 text-xs text-slate-400">ZIP context {zip} applied in routing logic.</p>
              </div>
            </div>
          </div>

          <div className="mt-6 grid gap-4 lg:grid-cols-3">
            {matches.map((pro, idx) => (
              <article key={pro.id} className="rounded-xl border border-slate-200 p-4">
                <div className="flex items-center justify-between">
                  <p className="font-bold">#{idx + 1} {pro.name}</p>
                  <span className="rounded-md bg-emerald-50 px-2 py-1 text-xs font-bold text-emerald-700">Score {pro.score}</span>
                </div>
                <p className="mt-1 text-sm text-slate-600">{pro.trade} • {pro.local}</p>
                <p className="mt-1 text-sm text-slate-600">ETA {pro.eta}m • {pro.jobs} jobs completed</p>
              </article>
            ))}
          </div>

          <div className="mt-6 rounded-xl bg-slate-50 p-4 ring-1 ring-slate-200">
            <p className="text-xs font-bold uppercase tracking-wider text-slate-500">Execution state</p>
            <div className="mt-3 grid gap-2 md:grid-cols-5">
              {stageOrder.map((label, idx) => (
                <div key={label} className={`rounded-lg px-3 py-2 text-sm font-semibold ${idx <= stage ? 'bg-indigo-600 text-white' : 'bg-white text-slate-500 ring-1 ring-slate-200'}`}>
                  {label}
                </div>
              ))}
            </div>
            <div className="mt-4 flex gap-2">
              <button onClick={advanceStage} className="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-bold text-white hover:bg-indigo-500">Advance Job</button>
              <button onClick={resetStage} className="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-bold text-slate-700">Reset</button>
            </div>
          </div>
        </section>
      );
    }

    function App() {
      const [email, setEmail] = React.useState('');
      const [joined, setJoined] = React.useState(false);

      const onJoin = (e) => {
        e.preventDefault();
        if (!email) return;
        setJoined(true);
      };

      return (
        <div>
          <header className="hero-gradient text-white">
            <div className="mx-auto max-w-6xl px-6 py-16 md:py-24">
              <p className="inline-flex rounded-full bg-cyan-400/20 px-3 py-1 text-xs font-bold uppercase tracking-wider text-cyan-200 ring-1 ring-cyan-300/40">
                Next Phase Prototype
              </p>
              <h1 className="mt-4 max-w-4xl text-4xl font-extrabold leading-tight md:text-6xl">
                TrustFix: local pros marketplace with agentic reliability workflows.
              </h1>
              <p className="mt-5 max-w-3xl text-lg text-slate-200">
                We kept the original marketplace vision and upgraded it with real AI behavior: dynamic intake parsing, transparent matching, and lifecycle tracking from booking to completion.
              </p>
            </div>
          </header>

          <main className="mx-auto max-w-6xl space-y-10 px-6 py-12">
            <NextPhasePlanner />

            <section className="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
              <h3 className="text-xl font-extrabold">Why this phase matters</h3>
              <div className="mt-4 grid gap-4 md:grid-cols-3">
                {[
                  ['Homeowner confidence', 'Every recommendation shows reasoning and reliability context.'],
                  ['Pro fairness', 'Ranking uses service quality and responsiveness over ad budget.'],
                  ['Operational clarity', 'Job stage tracker makes fulfillment and handoffs visible.'],
                ].map(([title, desc]) => (
                  <div key={title} className="rounded-xl bg-slate-50 p-4 ring-1 ring-slate-200">
                    <p className="font-bold">{title}</p>
                    <p className="mt-2 text-sm text-slate-700">{desc}</p>
                  </div>
                ))}
              </div>
            </section>

            <section className="rounded-2xl bg-slate-900 p-8 text-white">
              <h3 className="text-2xl font-extrabold">Join phase-2 pilot</h3>
              <p className="mt-2 text-slate-300">Get invited as a homeowner or local pro while we activate intelligent matching in Springfield.</p>
              <form onSubmit={onJoin} className="mt-4 flex flex-col gap-3 md:flex-row">
                <input
                  type="email"
                  required
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  placeholder="you@example.com"
                  className="w-full rounded-lg border border-slate-600 bg-slate-800 px-4 py-3 text-white placeholder:text-slate-400"
                />
                <button className="rounded-lg bg-indigo-500 px-5 py-3 font-bold hover:bg-indigo-400">Request invite</button>
              </form>
              {joined && <p className="mt-3 text-sm text-emerald-300">Success. You are on the phase-2 pilot list.</p>}
            </section>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
