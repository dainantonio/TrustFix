<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrustFix | Phase 4 Autonomy Layer</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    body { font-family: Inter, system-ui, -apple-system, sans-serif; }
    .hero-gradient {
      background: radial-gradient(circle at 10% 20%, rgba(59,130,246,0.35), transparent 35%),
                  radial-gradient(circle at 90% 10%, rgba(45,212,191,0.3), transparent 30%),
                  linear-gradient(145deg, #0f172a 0%, #111827 50%, #1e293b 100%);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const STORAGE_KEY = 'trustfix.reliabilityEvents.v1';

    const contractors = [
      { id: 1, name: 'Maya Plumbing Co.', trade: 'plumbing', etaMin: 32, activeJobs: 1 },
      { id: 2, name: 'Marcus HVAC', trade: 'hvac', etaMin: 28, activeJobs: 2 },
      { id: 3, name: 'CoolAir Pro', trade: 'hvac', etaMin: 28, activeJobs: 1 },
      { id: 4, name: 'Springfield Rooter', trade: 'plumbing', etaMin: 24, activeJobs: 1 },
      { id: 5, name: 'Rapid Dry Mitigation', trade: 'mitigation', etaMin: 35, activeJobs: 1 },
    ];

    const categoryAverage = { plumbing: 220, hvac: 340, mitigation: 450, general: 180 };

    function seedEvents() {
      const now = Date.now();
      const day = 24 * 60 * 60 * 1000;
      return [
        { contractorId: 1, jobId: 'j-100', type: 'completed_on_time', timestamp: now - day * 2, rating: 5 },
        { contractorId: 1, jobId: 'j-101', type: 'completed_on_time', timestamp: now - day * 1, rating: 5 },
        { contractorId: 2, jobId: 'j-200', type: 'dispute', timestamp: now - day * 10, rating: 2 },
        { contractorId: 2, jobId: 'j-201', type: 'dispute', timestamp: now - day * 5, rating: 1 },
        { contractorId: 3, jobId: 'j-300', type: 'completed_on_time', timestamp: now - day * 3, rating: 5 },
        { contractorId: 4, jobId: 'j-400', type: 'completed_on_time', timestamp: now - day * 6, rating: 5 },
      ];
    }

    function loadEvents() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          const seeded = seedEvents();
          localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded));
          return seeded;
        }
        return JSON.parse(raw);
      } catch {
        return seedEvents();
      }
    }

    function calcScore(events) {
      if (!events.length) return 60;
      const now = Date.now();
      const sorted = [...events].sort((a, b) => a.timestamp - b.timestamp);
      const ageDays = (now - sorted[sorted.length - 1].timestamp) / (1000 * 60 * 60 * 24);
      const baseScore = 50;
      const recencyWeight = Math.max(0.7, 1.25 - Math.min(ageDays / 60, 0.55));
      const onTime = sorted.filter((e) => e.type === 'completed_on_time').length;
      const late = sorted.filter((e) => e.type === 'late').length;
      const disputes = sorted.filter((e) => e.type === 'dispute').length;
      const cancelled = sorted.filter((e) => e.type === 'cancelled').length;
      const total = onTime + late + disputes + cancelled;
      const onTimeRate = total ? onTime / total : 0;
      const completionVolume = Math.min(total / 15, 1);
      const disputePenalty = disputes + cancelled * 0.6;
      const score = baseScore * recencyWeight + onTimeRate * 40 + completionVolume * 10 - disputePenalty * 15;
      return Math.max(0, Math.min(100, Math.round(score)));
    }

    function fallbackParse(description) {
      const t = description.toLowerCase();
      const trade = /(hvac|ac|cooling|furnace)/.test(t) ? 'hvac' : /(pipe|leak|valve|drain|water)/.test(t) ? 'plumbing' : 'general';
      const severity = /(critical|flood|burst|fire)/.test(t) ? 'critical' : 'moderate';
      const urgency = /(now|asap|urgent|immediately)/.test(t) ? 'emergency' : 'same-day';
      const flags = [];
      if (/(water|leak|flood|wet)/.test(t)) flags.push('potential_water_damage');
      return { trade, severity, urgency, summary: description.slice(0, 120), suggestedActions: ['Inspect site', 'Verify safety', 'Scope repair'], flags };
    }

    async function llmParseIntake(description) {
      const apiKey = window.TRUSTFIX_OPENAI_API_KEY;
      if (!apiKey) throw new Error('No API key');
      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${apiKey}` },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          temperature: 0,
          response_format: { type: 'json_object' },
          messages: [
            { role: 'system', content: 'Return JSON with trade,severity,urgency,summary,suggestedActions,flags' },
            { role: 'user', content: description },
          ],
        }),
      });
      if (!response.ok) throw new Error(`LLM failed ${response.status}`);
      const data = await response.json();
      return JSON.parse(data.choices?.[0]?.message?.content || '{}');
    }

    function App() {
      const [events, setEvents] = React.useState(loadEvents);
      const [suspended, setSuspended] = React.useState({});
      const [description, setDescription] = React.useState('Marcus HVAC is late and AC still not cooling.');
      const [parsed, setParsed] = React.useState(null);
      const [matches, setMatches] = React.useState([]);
      const [agentLog, setAgentLog] = React.useState([]);
      const [notifications, setNotifications] = React.useState([]);
      const [preferenceMemory, setPreferenceMemory] = React.useState({ homeownerId: 'dain', acceptedByContractor: { 1: 3 } });
      const [jobs, setJobs] = React.useState([
        {
          id: 'job-live-1', homeownerId: 'dain', address: '14 Maple St', title: 'AC not cooling', trade: 'hvac',
          contractorId: 2, status: 'In Progress', quotedPrice: 495, createdAt: Date.now() - 2 * 60 * 60 * 1000,
          startedAt: Date.now() - 90 * 60 * 1000, etaDueAt: Date.now() - 47 * 60 * 1000,
          flags: {},
        },
        {
          id: 'job-live-2', homeownerId: 'dain', address: '14 Maple St', title: 'simple faucet fix', trade: 'plumbing',
          contractorId: 1, status: 'In Progress', quotedPrice: 180, createdAt: Date.now() - 5 * 60 * 60 * 1000,
          startedAt: Date.now() - 4.4 * 60 * 60 * 1000, etaDueAt: Date.now() - 20 * 60 * 1000,
          flags: {},
        },
      ]);

      const contractorStats = React.useMemo(() => contractors.map((c) => {
        const mine = events.filter((e) => e.contractorId === c.id);
        const score = calcScore(mine);
        const preferenceBoost = preferenceMemory.acceptedByContractor[c.id] ? 2 : 0;
        return { ...c, score: Math.min(100, score + preferenceBoost) };
      }), [events, preferenceMemory]);

      function enqueueNotification(n) {
        setNotifications((prev) => prev.find((x) => x.key === n.key) ? prev : [{ ...n, id: crypto.randomUUID(), status: 'open' }, ...prev].slice(0, 20));
      }

      function contractorById(id) {
        return contractorStats.find((c) => c.id === id) || contractors.find((c) => c.id === id);
      }

      function findBackup(job) {
        return contractorStats
          .filter((c) => c.trade === job.trade && c.id !== job.contractorId && !suspended[c.id])
          .sort((a, b) => (b.score - a.score) || (a.etaMin - b.etaMin))[0];
      }

      function applyRouting(intake) {
        let pool = contractorStats.filter((c) => (c.trade === intake.trade || (intake.flags || []).includes('potential_water_damage') && c.trade === 'mitigation'));
        if (intake.severity === 'critical') pool = pool.filter((c) => c.score >= 95 && c.etaMin <= 120);
        if (intake.urgency === 'emergency') pool = pool.slice(0, 3);
        pool = pool.filter((c) => c.activeJobs <= 2 && !suspended[c.id]);
        const ranked = pool.sort((a, b) => (b.score - a.score) || (a.etaMin - b.etaMin));
        setMatches(ranked);
        setAgentLog((l) => [`Parsed: ${intake.trade}, ${intake.severity} severity. Applying ${intake.urgency} routing rules. Excluding contractors with active jobs > 2. Ranked ${ranked.length} candidates.`, ...l].slice(0, 12));
      }

      async function runIntake() {
        try {
          const intake = await llmParseIntake(description);
          setParsed(intake);
          applyRouting(intake);
        } catch (e) {
          const intake = fallbackParse(description);
          setParsed(intake);
          setAgentLog((l) => [`⚠️ LLM unavailable, fallback parser used: ${e.message}`, ...l].slice(0, 12));
          applyRouting(intake);
        }
      }

      function handleNotificationAction(n, action) {
        setNotifications((prev) => prev.map((x) => x.id === n.id ? { ...x, status: action === 'dismiss' ? 'dismissed' : 'accepted' } : x));

        if (action === 'why') {
          setAgentLog((l) => [`Why: ${n.why}`, ...l].slice(0, 12));
          return;
        }

        if (action === 'accept' && n.type === 'rematch' && n.jobId && n.backupId) {
          setJobs((prev) => prev.map((j) => j.id === n.jobId
            ? { ...j, contractorId: n.backupId, etaDueAt: Date.now() + (contractorById(n.backupId).etaMin * 60 * 1000), flags: { ...j.flags, rematched: true } }
            : j));
          setPreferenceMemory((m) => ({
            ...m,
            acceptedByContractor: { ...m.acceptedByContractor, [n.backupId]: (m.acceptedByContractor[n.backupId] || 0) + 1 },
          }));
          setAgentLog((l) => [`Accepted auto re-match to ${contractorById(n.backupId).name}. Preference memory updated.`, ...l].slice(0, 12));
        }
      }

      React.useEffect(() => { runIntake(); }, []);

      React.useEffect(() => {
        const timer = setInterval(() => {
          const now = Date.now();

          setJobs((prevJobs) => {
            const nextJobs = prevJobs.map((job) => {
              if (job.status !== 'In Progress') return job;
              const lateBy = Math.floor((now - job.etaDueAt) / 60000);
              let flags = { ...job.flags };

              if (lateBy > 15 && !flags.late15) {
                enqueueNotification({
                  key: `${job.id}-late15`,
                  type: 'watchdog',
                  jobId: job.id,
                  message: `${contractorById(job.contractorId).name} exceeded ETA by ${lateBy} min. Re-match option available.`,
                  why: 'ETA watchdog detected >15 minutes late on an in-progress job.',
                });
                setAgentLog((l) => [`ETA watchdog alert on ${job.id}: ${lateBy} minutes late.`, ...l].slice(0, 12));
                flags.late15 = true;
              }

              if (lateBy > 45 && !flags.late45) {
                const backup = findBackup(job);
                if (backup) {
                  enqueueNotification({
                    key: `${job.id}-late45`,
                    type: 'rematch',
                    jobId: job.id,
                    backupId: backup.id,
                    message: `${contractorById(job.contractorId).name} has exceeded ETA by ${lateBy} minutes. Backup found: ${backup.name} (score ${backup.score}, ETA ${backup.etaMin}min). Accept re-match?`,
                    why: 'Autonomous action threshold reached (>45 min late).',
                  });
                  setAgentLog((l) => [`Auto-action: initiated re-match proposal for ${job.id} after ${lateBy} min delay.`, ...l].slice(0, 12));
                }
                flags.late45 = true;
              }

              const durationHrs = (now - job.startedAt) / (1000 * 60 * 60);
              if (job.title.toLowerCase().includes('simple faucet fix') && durationHrs > 4 && !flags.durationAlert) {
                enqueueNotification({
                  key: `${job.id}-duration`,
                  type: 'anomaly',
                  jobId: job.id,
                  message: `${job.title} has been in progress for ${durationHrs.toFixed(1)} hours. Review recommended.`,
                  why: 'Unusual duration anomaly detected for a simple repair class.',
                });
                setAgentLog((l) => [`Duration anomaly on ${job.id}: ${durationHrs.toFixed(1)}h in progress.`, ...l].slice(0, 12));
                flags.durationAlert = true;
              }

              const avg = categoryAverage[job.trade] || 200;
              if (job.quotedPrice > avg * 1.3 && !flags.priceFlag) {
                enqueueNotification({
                  key: `${job.id}-price`,
                  type: 'anomaly',
                  jobId: job.id,
                  message: `Quoted price $${job.quotedPrice} is >30% above ${job.trade} average ($${avg}).`,
                  why: 'Price variance policy threshold exceeded.',
                });
                setAgentLog((l) => [`Price variance flag on ${job.id}: $${job.quotedPrice} vs avg $${avg}.`, ...l].slice(0, 12));
                flags.priceFlag = true;
              }

              return { ...job, flags };
            });

            const sixtyDays = 60 * 24 * 60 * 60 * 1000;
            const plumbingAtAddress = nextJobs.filter((j) => j.address === '14 Maple St' && j.trade === 'plumbing' && now - j.createdAt <= sixtyDays).length;
            if (plumbingAtAddress >= 2) {
              enqueueNotification({
                key: 'address-pattern-14-maple',
                type: 'memory',
                message: 'This address has had 2 plumbing jobs in 60 days — suggest preventive inspection.',
                why: 'Job pattern awareness rule detected repeat service at same address.',
              });
            }

            return nextJobs;
          });

          const thirtyDaysAgo = now - 30 * 24 * 60 * 60 * 1000;
          const disputesByContractor = {};
          events.forEach((e) => {
            if (e.type === 'dispute' && e.timestamp >= thirtyDaysAgo) {
              disputesByContractor[e.contractorId] = (disputesByContractor[e.contractorId] || 0) + 1;
            }
          });

          Object.entries(disputesByContractor).forEach(([id, count]) => {
            const cid = Number(id);
            if (count >= 2 && !suspended[cid]) {
              setSuspended((s) => ({ ...s, [cid]: true }));
              const c = contractorById(cid);
              enqueueNotification({
                key: `suspend-${cid}`,
                type: 'anomaly',
                message: `${c.name} suspended from new matches after ${count} disputes in 30 days.`,
                why: 'Repeat dispute detection policy triggered.',
              });
              setAgentLog((l) => [`Contractor suspended: ${c.name} (${count} disputes / 30 days).`, ...l].slice(0, 12));
            }
          });
        }, 5000);

        return () => clearInterval(timer);
      }, [events, suspended, contractorStats]);

      return (
        <div>
          <header className="hero-gradient text-white">
            <div className="mx-auto max-w-6xl px-6 py-14">
              <p className="inline-flex rounded-full bg-cyan-400/20 px-3 py-1 text-xs font-bold uppercase tracking-wider text-cyan-200 ring-1 ring-cyan-300/40">Phase 4: Proactive Agent + Autonomous Actions</p>
              <h1 className="mt-4 max-w-4xl text-4xl font-extrabold leading-tight md:text-5xl">TrustFix now watches, decides, and acts without waiting for clicks.</h1>
              <p className="mt-4 max-w-3xl text-slate-200">ETA watchdog, anomaly detection, homeowner notification queue, and memory-driven routing are live in this autonomy layer.</p>
            </div>
          </header>

          <main className="mx-auto max-w-6xl space-y-8 px-6 py-10">
            <section className="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
              <h2 className="text-xl font-extrabold">Intake + smart routing (Phase 3)</h2>
              <textarea value={description} onChange={(e) => setDescription(e.target.value)} rows="3" className="mt-3 w-full rounded-lg border border-slate-300 px-3 py-2" />
              <button onClick={runIntake} className="mt-3 rounded-lg bg-indigo-600 px-4 py-2 text-sm font-bold text-white">Run intake</button>
              {parsed && <pre className="mt-3 overflow-auto rounded-lg bg-slate-900 p-3 text-xs text-slate-100">{JSON.stringify(parsed, null, 2)}</pre>}
            </section>

            <section className="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
              <h2 className="text-xl font-extrabold">Live matches</h2>
              <div className="mt-4 grid gap-4 md:grid-cols-3">
                {matches.map((c) => (
                  <div key={c.id} className="rounded-xl border border-slate-200 p-4">
                    <p className="font-bold">{c.name}</p>
                    <p className="text-sm text-slate-600">{c.trade} • score {c.score} • ETA {c.etaMin}m</p>
                    {suspended[c.id] && <p className="mt-2 text-xs font-bold text-red-600">Suspended from new matches</p>}
                  </div>
                ))}
              </div>
            </section>

            <section className="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
              <h2 className="text-xl font-extrabold">In-progress jobs monitored by watchdog</h2>
              <div className="mt-4 space-y-3">
                {jobs.map((j) => (
                  <div key={j.id} className="rounded-xl border border-slate-200 p-4">
                    <p className="font-bold">{j.title} ({j.id})</p>
                    <p className="text-sm text-slate-600">{contractorById(j.contractorId).name} • {j.status} • quoted ${j.quotedPrice}</p>
                  </div>
                ))}
              </div>
            </section>

            <section className="rounded-2xl bg-slate-900 p-6 text-white">
              <h2 className="text-xl font-extrabold">Homeowner notification center</h2>
              <p className="mt-1 text-sm text-slate-300">Every agent-initiated action appears here with Accept / Dismiss / Ask why.</p>
              <div className="mt-4 space-y-3">
                {notifications.map((n) => (
                  <div key={n.id} className="rounded-lg bg-slate-800 p-3">
                    <p className="text-sm">{n.message}</p>
                    <div className="mt-2 flex flex-wrap gap-2">
                      <button onClick={() => handleNotificationAction(n, 'accept')} className="rounded bg-emerald-600 px-2 py-1 text-xs font-bold">Accept</button>
                      <button onClick={() => handleNotificationAction(n, 'dismiss')} className="rounded bg-slate-600 px-2 py-1 text-xs font-bold">Dismiss</button>
                      <button onClick={() => handleNotificationAction(n, 'why')} className="rounded bg-indigo-600 px-2 py-1 text-xs font-bold">Ask agent why</button>
                    </div>
                  </div>
                ))}
                {notifications.length === 0 && <p className="text-sm text-slate-400">No proactive actions yet.</p>}
              </div>
            </section>

            <section className="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
              <h2 className="text-xl font-extrabold">Agent memory + reasoning log</h2>
              <p className="mt-2 text-sm text-slate-600">Dain accepted Maya Plumbing {preferenceMemory.acceptedByContractor[1] || 0} times; preference boost applied in future ranking.</p>
              <ul className="mt-3 space-y-2">
                {agentLog.map((line, i) => <li key={i} className="rounded bg-slate-100 px-3 py-2 text-sm">{line}</li>)}
              </ul>
            </section>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
