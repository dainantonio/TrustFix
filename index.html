<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrustFix | Local Pros, AI Reliability</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    body { font-family: Inter, system-ui, -apple-system, sans-serif; }
    .hero-gradient {
      background: radial-gradient(circle at 10% 20%, rgba(59,130,246,0.35), transparent 35%),
                  radial-gradient(circle at 90% 10%, rgba(45,212,191,0.3), transparent 30%),
                  linear-gradient(145deg, #0f172a 0%, #111827 50%, #1e293b 100%);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const localPros = [
      { name: 'Maya Plumbing Co.', trade: 'Plumber', score: 98, eta: '32m', jobs: 214, local: 'Northside' },
      { name: 'Riverside Electric', trade: 'Electrician', score: 96, eta: '41m', jobs: 167, local: 'Downtown' },
      { name: 'Evergreen Home Repair', trade: 'Handyman', score: 95, eta: '27m', jobs: 289, local: 'East End' },
    ];

    const issueLibrary = {
      'burst pipe': {
        urgency: 'High',
        firstStep: 'Shut off water and isolate the affected line.',
        aiAction: 'Dispatch top 3 plumbers within 5 miles, prioritize rapid ETA + emergency completion history.'
      },
      'no power': {
        urgency: 'High',
        firstStep: 'Check breaker panel and isolate non-essential loads.',
        aiAction: 'Route licensed electricians, require same-day diagnostic acceptance.'
      },
      'water heater': {
        urgency: 'Medium',
        firstStep: 'Disable heater power source and inspect leak points.',
        aiAction: 'Rank pros by replacement lead time, warranty experience, and parts readiness.'
      }
    };

    function AIPlanner() {
      const [issue, setIssue] = React.useState('burst pipe');
      const [zip, setZip] = React.useState('01103');
      const current = issueLibrary[issue];

      return (
        <section className="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
          <div className="flex items-center justify-between gap-4">
            <div>
              <p className="text-xs font-bold uppercase tracking-wider text-indigo-600">AI Service Copilot</p>
              <h3 className="mt-1 text-xl font-extrabold">Plan and match a job in seconds</h3>
            </div>
            <span className="rounded-full bg-indigo-50 px-3 py-1 text-xs font-bold text-indigo-700">Local-first routing</span>
          </div>

          <div className="mt-5 grid gap-4 md:grid-cols-2">
            <label className="text-sm font-semibold text-slate-700">Issue type
              <select value={issue} onChange={(e) => setIssue(e.target.value)} className="mt-2 w-full rounded-lg border border-slate-300 px-3 py-2">
                <option value="burst pipe">Burst pipe</option>
                <option value="no power">No power</option>
                <option value="water heater">Water heater failure</option>
              </select>
            </label>

            <label className="text-sm font-semibold text-slate-700">ZIP code
              <input value={zip} onChange={(e) => setZip(e.target.value)} className="mt-2 w-full rounded-lg border border-slate-300 px-3 py-2" />
            </label>
          </div>

          <div className="mt-5 rounded-xl bg-slate-900 p-4 text-slate-100">
            <p><strong>Urgency:</strong> {current.urgency}</p>
            <p className="mt-2"><strong>Immediate step:</strong> {current.firstStep}</p>
            <p className="mt-2"><strong>AI dispatch logic:</strong> {current.aiAction}</p>
            <p className="mt-2 text-xs text-slate-300">Zip context: {zip}. Matching results prioritize licensed pros from the nearest local zones.</p>
          </div>
        </section>
      );
    }

    function App() {
      const [waitlistEmail, setWaitlistEmail] = React.useState('');
      const [joined, setJoined] = React.useState(false);

      const onJoin = (e) => {
        e.preventDefault();
        if (!waitlistEmail) return;
        setJoined(true);
      };

      return (
        <div>
          <header className="hero-gradient text-white">
            <div className="mx-auto max-w-6xl px-6 py-16 md:py-24">
              <p className="inline-flex rounded-full bg-cyan-400/20 px-3 py-1 text-xs font-bold uppercase tracking-wider text-cyan-200 ring-1 ring-cyan-300/40">
                Reliable Hands, Reinvented for Locals
              </p>
              <h1 className="mt-4 max-w-4xl text-4xl font-extrabold leading-tight md:text-6xl">
                TrustFix helps homeowners hire local pros with AI-verified reliability.
              </h1>
              <p className="mt-5 max-w-3xl text-lg text-slate-200">
                Angie-style discovery, but better for your neighborhood: transparent reliability scores, faster response times, and guided jobs from intake to resolution.
              </p>

              <div className="mt-10 grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
                {[
                  ['On-time arrivals', '96%'],
                  ['Local jobs completed', '10k+'],
                  ['Avg. first response', '<8 min'],
                  ['Disputes resolved', '<24h'],
                ].map(([k, v]) => (
                  <div key={k} className="rounded-xl bg-white/10 p-4 ring-1 ring-white/20 backdrop-blur-sm">
                    <p className="text-2xl font-extrabold">{v}</p>
                    <p className="text-sm text-slate-200">{k}</p>
                  </div>
                ))}
              </div>
            </div>
          </header>

          <main className="mx-auto max-w-6xl space-y-12 px-6 py-12">
            <section className="grid gap-6 lg:grid-cols-2">
              <AIPlanner />

              <section className="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
                <p className="text-xs font-bold uppercase tracking-wider text-emerald-600">Live local leaderboard</p>
                <h3 className="mt-1 text-xl font-extrabold">Top trusted pros near you</h3>
                <div className="mt-5 space-y-3">
                  {localPros.map((pro) => (
                    <article key={pro.name} className="rounded-xl border border-slate-200 p-4">
                      <div className="flex items-center justify-between">
                        <div>
                          <p className="font-bold">{pro.name}</p>
                          <p className="text-sm text-slate-600">{pro.trade} • {pro.local}</p>
                        </div>
                        <div className="rounded-lg bg-emerald-50 px-3 py-1 text-sm font-bold text-emerald-700">Score {pro.score}</div>
                      </div>
                      <div className="mt-2 text-sm text-slate-600">ETA {pro.eta} • {pro.jobs} completed jobs</div>
                    </article>
                  ))}
                </div>
              </section>
            </section>

            <section className="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
              <h3 className="text-xl font-extrabold">How TrustFix beats legacy directories</h3>
              <div className="mt-4 grid gap-4 md:grid-cols-3">
                {[
                  ['Real performance data', 'Scoring reflects arrivals, completions, callback rate, and homeowner confirmations.'],
                  ['AI-guided fulfillment', 'Agents monitor jobs and trigger proactive updates when milestones slip.'],
                  ['Local economy focus', 'Neighborhood pros are promoted for consistency, not ad budget size.'],
                ].map(([title, desc]) => (
                  <div key={title} className="rounded-xl bg-slate-50 p-4 ring-1 ring-slate-200">
                    <p className="font-bold">{title}</p>
                    <p className="mt-2 text-sm text-slate-700">{desc}</p>
                  </div>
                ))}
              </div>
            </section>

            <section className="rounded-2xl bg-slate-900 p-8 text-white">
              <h3 className="text-2xl font-extrabold">Join the Springfield launch waitlist</h3>
              <p className="mt-2 text-slate-300">Get early homeowner access or bring your local service business onto the platform.</p>
              <form onSubmit={onJoin} className="mt-5 flex flex-col gap-3 md:flex-row">
                <input
                  type="email"
                  required
                  placeholder="you@example.com"
                  value={waitlistEmail}
                  onChange={(e) => setWaitlistEmail(e.target.value)}
                  className="w-full rounded-lg border border-slate-600 bg-slate-800 px-4 py-3 text-white placeholder:text-slate-400"
                />
                <button className="rounded-lg bg-indigo-500 px-5 py-3 font-bold hover:bg-indigo-400">Request early access</button>
              </form>
              {joined && <p className="mt-3 text-sm text-emerald-300">You are in. We will send your invite before public launch.</p>}
            </section>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
